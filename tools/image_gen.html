<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: flex-start; }

  .card {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #0a0a0a 0%, #111827 50%, #0f172a 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 100px;
    overflow: hidden;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }

  /* グリッド背景 */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* 光のアクセント */
  .card::after {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }

  .accent-line {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #6366f1, #818cf8);
    margin-bottom: 36px;
    border-radius: 2px;
  }

  .label {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: #6366f1;
    text-transform: uppercase;
    margin-bottom: 28px;
    font-weight: 500;
  }

  .title {
    font-size: 48px;
    font-weight: 700;
    color: #f1f5f9;
    line-height: 1.5;
    letter-spacing: 0.02em;
    max-width: 900px;
    position: relative;
    z-index: 1;
  }

  .title em {
    font-style: normal;
    color: #818cf8;
  }

  .subtitle {
    margin-top: 32px;
    font-size: 18px;
    color: #64748b;
    letter-spacing: 0.05em;
    line-height: 1.8;
    position: relative;
    z-index: 1;
  }

  .author {
    position: absolute;
    bottom: 50px;
    right: 80px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 1;
  }

  .author-name {
    font-size: 16px;
    color: #475569;
    letter-spacing: 0.1em;
  }

  .author-tag {
    font-size: 12px;
    color: #334155;
    letter-spacing: 0.08em;
  }

  .corner-deco {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle at bottom left, rgba(99,102,241,0.06) 0%, transparent 60%);
  }
</style>
</head>
<body>
<div class="card">
  <div class="corner-deco"></div>
  <div class="accent-line"></div>
  <div class="label">全1論 × 人間関係</div>
  <div class="title">
    嫌悪感は<em>境界線の言語</em>である<br>
    <span style="font-size:36px; color:#94a3b8;">——他者の身体が不快なとき、あなたは何を守っている</span>
  </div>
  <div class="subtitle">感情ではない。センサーの出力だ。</div>
  <div class="author">
    <div>
      <div class="author-name">ミリテク</div>
      <div class="author-tag">言語化の技術 / 全1論</div>
    </div>
  </div>
</div>
</body>
</html>
