# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# あなたが設定する項目（初回1回だけ編集）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

platform: "zenn"

# 記事のジャンル（例: "副業・節税" "投資入門" "AI活用術"）
niche: "副業・節税"

# 1日に生成・投稿する記事数（GitHub Actions無料枠では2記事まで推奨）
articles_per_day: 2

# 月間APIコスト上限（円）。超えたら即停止
monthly_cost_limit: 2000

# 記事品質スコアの閾値（0-100）。この点数未満は再生成（最大2回）
quality_threshold: 70

# 使用モデル
model: "claude-sonnet-4-6"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 以下はanalyst.pyが自動更新（触らないでください）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
auto_strategy:
  top_keywords: []
  best_style: ""
  last_updated: ""
  weekly_report: ""
