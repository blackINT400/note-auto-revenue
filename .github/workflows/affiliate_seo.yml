name: Affiliate SEO Auto Runner

on:
  schedule:
    - cron: '0 20 * * *'   # 毎日 05:00 JST（記事生成・公開）
    - cron: '0 2 * * 1'    # 毎週月曜 11:00 JST（週次分析）
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'daily'
        type: choice
        options: [daily, weekly]
      business_id:
        description: '事業ID (businesses/ 配下のディレクトリ名)'
        required: true
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Affiliate SEO
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USER: ${{ secrets.WORDPRESS_USER }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
        run: |
          BIZ_ID="${{ inputs.business_id }}"
          MODE="${{ inputs.mode || 'daily' }}"
          if [ -z "$BIZ_ID" ]; then
            echo "business_id が指定されていません"
            exit 1
          fi
          python "businesses/${BIZ_ID}/main.py" --mode "${MODE}"

      - name: Commit results (articles + public/)
        run: |
          git config --global user.email "empire-bot@auto-revenue.bot"
          git config --global user.name "Empire Bot"
          BIZ_ID="${{ inputs.business_id }}"
          git add "businesses/${BIZ_ID}/" || true
          git diff --staged --quiet || \
            git commit -m "affiliate_seo: auto update $(date +%Y-%m-%d) [skip ci]"
          git push
