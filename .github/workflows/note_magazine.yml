name: note Magazine Auto Runner

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 06:00 JST
    - cron: '0 23 * * 0'   # 毎週日曜 08:00 JST → 週次分析
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'daily'
        type: choice
        options: [daily, weekly]
      business_id:
        description: '事業ID (businesses/ 配下のディレクトリ名)'
        required: true
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run note Magazine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          NOTE_SESSION_COOKIE: ${{ secrets.NOTE_SESSION_COOKIE }}
        run: |
          # スケジュール実行はデフォルト事業を使用
          BIZ_ID="${{ inputs.business_id || 'note_言語化全1論' }}"
          MODE="${{ inputs.mode || 'daily' }}"
          python "businesses/${BIZ_ID}/main.py" --mode "${MODE}"

      - name: Commit results
        run: |
          git config --global user.email "empire-bot@auto-revenue.bot"
          git config --global user.name "Empire Bot"
          BIZ_ID="${{ inputs.business_id || 'note_言語化全1論' }}"
          git add "businesses/${BIZ_ID}/" thoughts/ || true
          git diff --staged --quiet || \
            git commit -m "note_magazine: auto update $(date +%Y-%m-%d) [skip ci]"
          git push
