name: YouTube BGM Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 09:00 JST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (skip upload)'
        required: false
        default: 'false'
      genre:
        description: 'Genre override (e.g. "cozy jazz cafe")'
        required: false
        default: ''

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Verify ffmpeg
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ffmpeg --fix-missing || true
          fi
          ffmpeg -version

      - name: Install Python dependencies
        run: |
          pip install -r youtube_bgm/requirements.txt
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Determine run mode
        id: mode
        run: |
          DOW=$(date +%u)
          if [ "$DOW" = "1" ]; then
            echo "mode=weekly" >> $GITHUB_OUTPUT
          else
            echo "mode=daily" >> $GITHUB_OUTPUT
          fi

      - name: Run BGM pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_YOUTUBE }}
        run: |
          cd youtube_bgm
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          GENRE_INPUT="${{ github.event.inputs.genre }}"
          if [ -n "$GENRE_INPUT" ]; then
            python pipeline.py --mode ${{ steps.mode.outputs.mode }} $DRY_FLAG --genre "$GENRE_INPUT"
          else
            python pipeline.py --mode ${{ steps.mode.outputs.mode }} $DRY_FLAG
          fi

      - name: Verify generated video with ffprobe
        if: success()
        run: |
          VIDEO=$(python3 -c "import json,glob; f=sorted(glob.glob('youtube_bgm/data/ready/*.json'),reverse=True); print(json.load(open(f[0])).get('video_file_path','') if f else '')" 2>/dev/null || echo "")
          if [ -n "$VIDEO" ] && [ -f "$VIDEO" ]; then
            echo "=== ffprobe: $VIDEO ==="
            ffprobe -v quiet -print_format json -show_streams "$VIDEO" | python3 -c "import json,sys; [print(f'VIDEO: {s[chr(34)]}{s[\"codec_name\"]}{chr(34)} {s.get(\"width\")}x{s.get(\"height\")} @ {s.get(\"r_frame_rate\")} fps') if s['codec_type']=='video' else print(f'AUDIO: {s[\"codec_name\"]} {s.get(\"bit_rate\",\"?\")} bps sr={s.get(\"sample_rate\")}') if s['codec_type']=='audio' else None for s in json.load(sys.stdin).get('streams',[])]"
          else
            echo "動画ファイルが見つかりません（dry_runまたはエラー）"
          fi

      - name: Notify Discord on success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_YOUTUBE }}
        run: |
          PACKAGE=$(ls -t youtube_bgm/data/ready/*.json 2>/dev/null | head -1)
          if [ -n "$PACKAGE" ]; then
            TITLE=$(python3 -c "import json,sys; d=json.load(open('$PACKAGE')); print(d.get('title',''))")
            VIDEO_ID=$(python3 -c "import json,sys; d=json.load(open('$PACKAGE')); print(d.get('video_id',''))" 2>/dev/null || echo "")
            MSG="✅ YouTube BGMアップロード完了\n**$TITLE**"
            if [ -n "$VIDEO_ID" ]; then
              MSG="$MSG\nhttps://youtu.be/$VIDEO_ID"
            fi
          else
            MSG="✅ YouTube BGMパイプライン完了"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}" || true

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_YOUTUBE }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"content": "❌ YouTube BGMパイプライン失敗。ログを確認してください。"}' || true

      - name: Commit generated packages
        if: always()
        run: |
          git config user.email noreply@anthropic.com
          git config user.name Claude
          git add youtube_bgm/data/ready/ || true
          git diff --cached --quiet || git commit -m "chore: youtube_bgm auto-generated packages [skip ci]"
          git push || true
